<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Care Binder • CareNestia</title>

<link rel="stylesheet" href="styles.css">

<style>

.binder-shell{
display:grid;
grid-template-columns:280px 1fr;
gap:20px;
}

.binder-sidebar{
display:flex;
flex-direction:column;
gap:16px;
}

.binder-profile{
padding:0;
overflow:hidden;
}

.binder-photo{
width:100%;
height:180px;
object-fit:cover;
background:#eef2ff;
}

.binder-profile-body{
padding:16px;
}

.binder-name{
font-size:1.3rem;
font-weight:700;
margin-bottom:4px;
}

.binder-nav a{
display:block;
padding:12px 16px;
font-weight:600;
text-decoration:none;
color:var(--text);
border-left:3px solid transparent;
}

.binder-nav a.active{
background:#f3f4ff;
border-left-color:var(--primary);
color:var(--primary);
}

.binder-main{
display:flex;
flex-direction:column;
gap:16px;
}

.kv-row{
display:grid;
grid-template-columns:180px 1fr;
gap:12px;
padding:8px 0;
border-bottom:1px dashed #e6e6e6;
}

.entry-item{
border:1px solid #e5e5e5;
border-radius:12px;
padding:10px;
margin-bottom:10px;
background:white;
}

.modal-backdrop{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.45);
z-index:1000;
}

.modal-backdrop.open{
display:flex;
}

.modal-card{
background:white;
border-radius:16px;
width:600px;
max-width:95%;
padding:20px;
}

</style>

</head>

<body>

<div class="app-shell">

<!-- SIDEBAR -->

<aside class="app-sidebar">

<div class="sidebar-brand">
<img src="images/carenestia_logo_wordmark.png" class="sidebar-wordmark">
</div>

<nav class="sidebar-nav">

<a class="sidebar-link" href="index.html">Dashboard</a>
<a class="sidebar-link" href="schedule.html">Schedule</a>
<a class="sidebar-link" href="meds.html">Medications</a>
<a class="sidebar-link" href="carelog.html">Care Log</a>
<a class="sidebar-link" href="inventory.html">Inventory</a>
<a class="sidebar-link" href="schoolnurse.html">School Nurse</a>
<a class="sidebar-link active" href="documents.html">Care Binder</a>

</nav>

</aside>

<!-- MAIN -->

<div class="app-main">

<header class="app-topbar">

<div class="topbar-child-card">

<div id="childAvatar" class="topbar-child-avatar"></div>

<div>

<select id="childSwitcher" class="topbar-child-select"></select>

<div id="childSummary" class="topbar-child-meta"></div>

</div>

</div>

<button id="logoutBtn" class="btn btn-ghost">Log out</button>

</header>

<main class="app-content">

<div class="binder-shell">

<!-- SIDEBAR -->

<aside class="binder-sidebar">

<section class="card binder-profile">

<img id="binderPhoto" class="binder-photo">

<div class="binder-profile-body">

<div id="binderName" class="binder-name"></div>

<div id="binderSub" class="muted"></div>

</div>

</section>

<button id="manageSectionsBtn" class="btn">Manage Sections</button>

<nav id="binderNav" class="card binder-nav"></nav>

</aside>

<!-- MAIN -->

<section class="binder-main">

<section class="card">

<h2 id="sectionTitle">Care Binder</h2>

<p id="sectionDesc" class="muted"></p>

<button id="editSectionBtn" class="btn btn-soft">Edit Section</button>

</section>

<div id="binderSectionContent"></div>

</section>

</div>

</main>

</div>

</div>

<!-- EDIT MODAL -->

<div id="editModal" class="modal-backdrop">

<div class="modal-card">

<h3 id="editTitle"></h3>

<textarea id="editNotes" class="input" rows="6"></textarea>

<br><br>

<button id="saveEditBtn" class="btn">Save</button>

<button id="cancelEditBtn" class="btn btn-ghost">Cancel</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="storage.js"></script>
<script src="auth.js"></script>
<script src="care-binder.js"></script>

</body>
</html>
