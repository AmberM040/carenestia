<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vitals • CareNestia</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app-shell">

<!-- SIDEBAR -->
<aside class="app-sidebar">

<div class="sidebar-brand">
<img src="images/carenestia_logo_wordmark.png" class="sidebar-wordmark">
</div>

<nav class="sidebar-nav">
<a class="sidebar-link" href="index.html">Dashboard</a>
<a class="sidebar-link" href="schedule.html">Schedule</a>
<a class="sidebar-link" href="meds.html">Medications</a>
<a class="sidebar-link" href="carelog.html">Care Log</a>
<a class="sidebar-link" href="inventory.html">Inventory</a>
<a class="sidebar-link" href="schoolnurse.html">School Nurse</a>
<a class="sidebar-link active" href="vitals.html">Vitals</a>
<a class="sidebar-link" href="more.html">More</a>
</nav>

</aside>

<!-- MAIN -->
<div class="app-main">

<header class="app-topbar">

<div class="topbar-child-card">
<div id="childAvatar" class="topbar-child-avatar"></div>

<div>
<select id="childSwitcher" class="topbar-child-select"></select>
<div id="childSummary" class="topbar-child-meta"></div>
</div>
</div>

<button id="logoutBtn" class="btn btn-ghost">Log out</button>

</header>

<main class="app-content">

<div class="main-column">

<section class="card">

<div class="section-head">
<h2>Vitals</h2>
<button id="btnAddVital" class="btn">Log Vitals</button>
</div>

<div class="muted">
Track temperature, oxygen, heart rate, respiratory rate and blood pressure.
</div>

</section>

<section class="card">

<div class="section-head">
<h2>Recent Vitals</h2>
</div>

<div id="vitalsList" class="stack-list"></div>

</section>

</div>

</main>
</div>
</div>

<!-- MODAL -->

<div id="vitalModal" class="modal hidden">
<div class="modal-card">

<div class="section-head">
<h2>Log Vitals</h2>
<button id="btnCloseVitalModal" class="btn btn-ghost">Close</button>
</div>

<div class="form-grid">

<div class="field">
<label>Temperature</label>
<input id="vitalTemp" class="input" placeholder="98.6">
</div>

<div class="field">
<label>Oxygen (SpO2)</label>
<input id="vitalO2" class="input" placeholder="98%">
</div>

<div class="field">
<label>Heart Rate</label>
<input id="vitalHR" class="input" placeholder="90">
</div>

<div class="field">
<label>Respiratory Rate</label>
<input id="vitalRR" class="input" placeholder="20">
</div>

<div class="field">
<label>Blood Pressure</label>
<input id="vitalBP" class="input" placeholder="100/60">
</div>

</div>

<div class="field mt-12">
<label>Notes</label>
<textarea id="vitalNotes" class="input"></textarea>
</div>

<div class="modal-actions">
<button id="btnSaveVital" class="btn">Save Vitals</button>
</div>

</div>
</div>

<script src="storage.js"></script>
<script src="vitals.js"></script>

</body>
</html>
