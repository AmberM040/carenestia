<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login • CareNestia</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background-color: #f4f7fb;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      border: 1px solid #e4e8f0;
    }

    .auth-card h1 {
      margin-bottom: 20px;
      font-size: 26px;
      text-align: center;
    }

    .auth-card p {
      text-align: center;
      margin-bottom: 20px;
      color: #666;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .auth-form input {
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #e4e8f0;
      font-size: 16px;
      width: 100%;
      box-sizing: border-box;
    }

    .auth-form input[type="email"],
    .auth-form input[type="password"] {
      background: #fafbff;
    }

    .btn {
      background-color: #4a90e2;
      color: white;
      padding: 12px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      width: 100%;
    }

    .btn:hover {
      background-color: #0062cc;
    }

    .btn-ghost {
      background-color: transparent;
      color: #4a90e2;
      border: 1px solid #4a90e2;
    }

    .btn-ghost:hover {
      background-color: #f4f8ff;
    }

    .error-msg {
      display: none;
      background-color: #fce4e4;
      color: #b42318;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 20px;
    }

    .success-msg {
      display: none;
      background-color: #e7f6ec;
      color: #137333;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 20px;
    }

    .forgot-password {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }

    .auth-footer {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
      color: #666;
    }

    .auth-footer a,
    .forgot-password a {
      color: #4a90e2;
      text-decoration: none;
    }

    .auth-footer a:hover,
    .forgot-password a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <section class="auth-card">
      <h1>Welcome Back</h1>
      <p>Log in to access your child’s care plan, logs, and schedule.</p>

      <div id="errorMsg" class="error-msg"></div>
      <div id="successMsg" class="success-msg"></div>

      <form id="loginForm" class="auth-form">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" type="email" placeholder="you@example.com" required />

        <label for="loginPassword">Password</label>
        <input id="loginPassword" type="password" placeholder="Enter your password" required />

        <button type="submit" class="btn">Log In</button>
        <button type="button" id="demoLoginBtn" class="btn btn-ghost">Use Demo Login</button>
      </form>

      <div class="forgot-password">
        <a href="forgot-password.html">Forgot Password?</a>
      </div>

      <div class="auth-footer">
        Don’t have an account? <a href="signup.html">Create one</a>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
</body>
</html>
