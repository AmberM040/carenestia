<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Welcome Setup • CareNest</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background: #f4f7fb;
    }

    .auth-card {
      width: 100%;
      max-width: 560px;
      background: #fff;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      border: 1px solid #e4e8f0;
    }

    .auth-card h1 {
      margin-bottom: 10px;
      text-align: center;
    }

    .auth-card p {
      text-align: center;
      color: #666;
      margin-bottom: 20px;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .auth-form input,
    .auth-form textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #d9e0ea;
      font-size: 16px;
      background: #fafbff;
    }

    .auth-form textarea {
      min-height: 100px;
      resize: vertical;
    }

    .btn {
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      background: #0062cc;
    }

    .error-msg {
      display: none;
      background: #fce4e4;
      color: #b42318;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .success-msg {
      display: none;
      background: #e7f6ec;
      color: #137333;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <section class="auth-card">
      <h1>Let’s set up your child’s profile</h1>
      <p>Add your first child so CareNest can build the dashboard around their care needs.</p>

      <div id="errorMsg" class="error-msg"></div>
      <div id="successMsg" class="success-msg"></div>

      <form id="onboardingForm" class="auth-form">
        <div class="field">
          <label for="childName">Child Name</label>
          <input id="childName" type="text" placeholder="Enter child name" required />
        </div>

        <div class="field">
          <label for="childBirthdate">Birthdate</label>
          <input id="childBirthdate" type="date" />
        </div>

        <div class="field">
          <label for="childDiagnoses">Diagnoses</label>
          <textarea id="childDiagnoses" placeholder="Example: Epilepsy, Cerebral Palsy, G-tube"></textarea>
        </div>

        <div class="field">
          <label for="childAllergies">Allergies</label>
          <textarea id="childAllergies" placeholder="List allergies if any"></textarea>
        </div>

        <div class="field">
          <label for="childNotes">Notes</label>
          <textarea id="childNotes" placeholder="Anything important caregivers should know"></textarea>
        </div>

        <button type="submit" class="btn">Save and Continue</button>
      </form>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="onboarding.js"></script>
  <script>
    requireAuth();
  </script>
</body>
</html>
