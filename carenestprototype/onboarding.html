<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Welcome Setup • CareNest</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background: #f4f7fb;
    }

    .auth-card {
      width: 100%;
      max-width: 760px;
      background: #fff;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      border: 1px solid #e4e8f0;
    }

    .auth-card h1 {
      margin-bottom: 10px;
      text-align: center;
    }

    .auth-card p {
      text-align: center;
      color: #666;
      margin-bottom: 20px;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .auth-form input,
    .auth-form textarea,
    .auth-form select {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #d9e0ea;
      font-size: 16px;
      background: #fafbff;
    }

    .auth-form textarea {
      min-height: 90px;
      resize: vertical;
    }

    .btn {
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      background: #0062cc;
    }

    .error-msg {
      display: none;
      background: #fce4e4;
      color: #b42318;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .success-msg {
      display: none;
      background: #e7f6ec;
      color: #137333;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .field label,
    .section-title {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .check-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .check-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      border: 1px solid #e4e8f0;
      border-radius: 10px;
      padding: 12px;
      background: #fcfdff;
    }

    .check-item input {
      width: auto;
      margin-top: 3px;
    }

    .subsection {
      border: 1px solid #e4e8f0;
      background: #f9fbff;
      border-radius: 12px;
      padding: 16px;
      display: none;
    }

    .subsection.show {
      display: block;
    }

    .muted-note {
      color: #667085;
      font-size: 14px;
      margin-top: -4px;
    }

    @media (max-width: 700px) {
      .grid-2,
      .check-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <section class="auth-card">
      <h1>Let’s set up your child’s profile</h1>
      <p>We’ll tailor CareNest so you only see the tools that fit your child’s care needs.</p>

      <div id="errorMsg" class="error-msg"></div>
      <div id="successMsg" class="success-msg"></div>

      <form id="onboardingForm" class="auth-form">
        <div class="grid-2">
          <div class="field">
            <label for="childName">Child Name</label>
            <input id="childName" type="text" placeholder="Enter child name" required />
          </div>

          <div class="field">
            <label for="childBirthdate">Birthdate</label>
            <input id="childBirthdate" type="date" />
          </div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="complexityLevel">Care Complexity</label>
            <select id="complexityLevel">
              <option value="mild">Mild</option>
              <option value="moderate" selected>Moderate</option>
              <option value="high">High</option>
            </select>
          </div>

          <div class="field">
            <label for="childAllergies">Allergies</label>
            <input id="childAllergies" type="text" placeholder="List allergies if any" />
          </div>
        </div>

        <div class="field">
          <label for="childDiagnoses">Diagnoses</label>
          <textarea id="childDiagnoses" placeholder="Example: Epilepsy, Cerebral palsy, G-tube"></textarea>
        </div>

        <div class="field">
          <label for="childNotes">Notes</label>
          <textarea id="childNotes" placeholder="Anything important caregivers should know"></textarea>
        </div>

        <div class="field">
          <div class="section-title">Which areas would you like CareNest to help manage?</div>
          <div class="muted-note">Choose only what applies right now. You can always change this later.</div>

          <div class="check-grid" style="margin-top: 12px;">
            <label class="check-item">
              <input type="checkbox" id="careMedications" />
              <span>Medications</span>
            </label>

            <label class="check-item">
              <input type="checkbox" id="careFeeds" />
              <span>Feeds / Nutrition</span>
            </label>

            <label class="check-item">
              <input type="checkbox" id="careRespiratory" />
              <span>Respiratory Care</span>
            </label>

            <label class="check-item">
              <input type="checkbox" id="careCardiology" />
              <span>Cardiology</span>
            </label>

            <label class="check-item">
              <input type="checkbox" id="careSymptoms" />
              <span>Symptoms / Episodes</span>
            </label>

            <label class="check-item">
              <input type="checkbox" id="careTherapies" />
              <span>Therapies</span>
            </label>

            <label class="check-item">
              <input type="checkbox" id="careAppointments" />
              <span>Appointments</span>
            </label>

            <label class="check-item">
              <input type="checkbox" id="careInventory" />
              <span>Medical Supplies / Inventory</span>
            </label>

            <label class="check-item">
              <input type="checkbox" id="careSchoolSupport" />
              <span>School / Nurse Communication</span>
            </label>
          </div>
        </div>

        <div id="respiratorySection" class="subsection">
          <div class="section-title">Respiratory Equipment</div>
          <div class="check-grid">
            <label class="check-item"><input type="checkbox" id="eqOxygen" /><span>Oxygen</span></label>
            <label class="check-item"><input type="checkbox" id="eqPulseOxResp" /><span>Pulse Ox</span></label>
            <label class="check-item"><input type="checkbox" id="eqNebulizer" /><span>Nebulizer</span></label>
            <label class="check-item"><input type="checkbox" id="eqSuction" /><span>Suction</span></label>
            <label class="check-item"><input type="checkbox" id="eqTrach" /><span>Trach</span></label>
            <label class="check-item"><input type="checkbox" id="eqVentilator" /><span>Ventilator</span></label>
            <label class="check-item"><input type="checkbox" id="eqCpapBipap" /><span>CPAP / BiPAP</span></label>
            <label class="check-item"><input type="checkbox" id="eqAirwayClearance" /><span>Airway Clearance</span></label>
          </div>
        </div>

        <div id="feedsSection" class="subsection">
          <div class="section-title">Feeding Support</div>
          <div class="check-grid">
            <label class="check-item"><input type="checkbox" id="eqGTube" /><span>G-Tube</span></label>
            <label class="check-item"><input type="checkbox" id="eqJTube" /><span>J-Tube</span></label>
            <label class="check-item"><input type="checkbox" id="eqFeedingPump" /><span>Feeding Pump</span></label>
            <label class="check-item"><input type="checkbox" id="eqContinuousFeeds" /><span>Continuous Feeds</span></label>
            <label class="check-item"><input type="checkbox" id="eqBolusFeeds" /><span>Bolus Feeds</span></label>
          </div>
        </div>

        <div id="cardiologySection" class="subsection">
          <div class="section-title">Cardiology Support</div>
          <div class="check-grid">
            <label class="check-item"><input type="checkbox" id="eqHeartRateMonitoring" /><span>Heart Rate Monitoring</span></label>
            <label class="check-item"><input type="checkbox" id="eqBloodPressureMonitoring" /><span>Blood Pressure Monitoring</span></label>
            <label class="check-item"><input type="checkbox" id="eqPulseOxCardio" /><span>Pulse Ox</span></label>
            <label class="check-item"><input type="checkbox" id="eqCardiacMonitor" /><span>Cardiac Monitor</span></label>
            <label class="check-item"><input type="checkbox" id="eqPacemaker" /><span>Pacemaker</span></label>
            <label class="check-item"><input type="checkbox" id="eqCentralLine" /><span>Central Line</span></label>
          </div>
        </div>

        <button type="submit" class="btn">Save and Continue</button>
      </form>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="onboarding.js"></script>
  <script>
    requireAuth();
  </script>
</body>
</html>
