<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />

<title>Reset Password • CareNest</title>

<link rel="stylesheet" href="styles.css" />

<style>
.auth-wrap {
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:20px;
  background:#f4f7fb;
}

.auth-card {
  width:100%;
  max-width:400px;
  background:#fff;
  border-radius:12px;
  padding:30px;
  box-shadow:0 4px 16px rgba(0,0,0,0.1);
  border:1px solid #e4e8f0;
}

.auth-card h1{
  text-align:center;
  margin-bottom:20px;
}

.auth-form{
  display:flex;
  flex-direction:column;
  gap:16px;
}

.auth-form input{
  padding:12px;
  border-radius:6px;
  border:1px solid #e4e8f0;
  font-size:16px;
}

.btn{
  background:#4a90e2;
  color:#fff;
  border:none;
  padding:12px;
  border-radius:6px;
  cursor:pointer;
}

.error-msg{
  display:none;
  background:#fce4e4;
  color:#b42318;
  padding:10px;
  border-radius:6px;
  margin-bottom:16px;
}

.success-msg{
  display:none;
  background:#e7f6ec;
  color:#137333;
  padding:10px;
  border-radius:6px;
  margin-bottom:16px;
}
</style>
</head>

<body>

<div class="auth-wrap">

<section class="auth-card">

<h1>Reset Password</h1>

<div id="errorMsg" class="error-msg"></div>
<div id="successMsg" class="success-msg"></div>

<form id="resetPasswordForm" class="auth-form">

<label for="newPassword">New Password</label>
<input id="newPassword" type="password" required />

<label for="confirmNewPassword">Confirm Password</label>
<input id="confirmNewPassword" type="password" required />

<button type="submit" class="btn">
Update Password
</button>

</form>

</section>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>

</body>
</html>
